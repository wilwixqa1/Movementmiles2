<!-- Movement & Miles UTM Tracking (S34: added mm_lp landing page + utm_content/utm_term to page views) -->
<!-- Paste into Squarespace: Settings > Advanced > Code Injection > FOOTER -->
<script>
(function() {
  var COOKIE_DAYS = 30;
  var COOKIE_PREFIX = 'mm_';
  var BACKEND_URL = 'https://movementmiles2-production.up.railway.app';
  var YMOVE_DOMAINS = ['movementandmiles.ymove.app', 'ymove.app/join/movementandmiles'];
  var UTM_PARAMS = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content', 'ym_source', 'mm_lp'];
  function setCookie(name, value, days) {
    var expires = '';
    if (days) {
      var d = new Date();
      d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
      expires = '; expires=' + d.toUTCString();
    }
    document.cookie = COOKIE_PREFIX + name + '=' + encodeURIComponent(value) + expires + '; path=/; SameSite=Lax';
  }
  function getCookie(name) {
    var match = document.cookie.match(new RegExp('(^| )' + COOKIE_PREFIX + name + '=([^;]+)'));
    return match ? decodeURIComponent(match[2]) : '';
  }
  var params = new URLSearchParams(window.location.search);
  var hasNewUtms = false;
  UTM_PARAMS.forEach(function(key) {
    var val = params.get(key);
    if (val) {
      setCookie(key, val, COOKIE_DAYS);
      hasNewUtms = true;
    }
  });
  // S34: Always set mm_lp from the landing page path when UTMs arrive.
  // This auto-captures which page the user landed on (e.g. /lp1a, /lp2a).
  if (hasNewUtms || !getCookie('mm_lp')) {
    setCookie('mm_lp', window.location.pathname, COOKIE_DAYS);
  }
  if (hasNewUtms || !getCookie('landing_page')) {
    setCookie('landing_page', window.location.pathname, COOKIE_DAYS);
    if (document.referrer) {
      setCookie('referrer', document.referrer, COOKIE_DAYS);
    }
  }
  function getStoredUtmParams() {
    var utmParts = [];
    UTM_PARAMS.forEach(function(key) {
      var val = getCookie(key);
      if (val) {
        utmParts.push(key + '=' + encodeURIComponent(val));
      }
    });
    return utmParts.join('&');
  }
  function rewriteYmoveLinks() {
    var utmString = getStoredUtmParams();
    if (!utmString) return;
    var selector = YMOVE_DOMAINS.map(function(d) { return 'a[href*="' + d + '"]'; }).join(',');
    var links = document.querySelectorAll(selector);
    links.forEach(function(link) {
      var href = link.getAttribute('href');
      if (href.indexOf('utm_source') > -1) return;
      var sep = href.indexOf('?') > -1 ? '&' : '?';
      link.setAttribute('href', href + sep + utmString);
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', rewriteYmoveLinks);
  } else {
    rewriteYmoveLinks();
  }
  var observer = new MutationObserver(function() {
    rewriteYmoveLinks();
  });
  observer.observe(document.body || document.documentElement, { childList: true, subtree: true });
 try {
    fetch(BACKEND_URL + '/api/page-view', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        page: document.title || 'Squarespace',
        path: window.location.pathname,
        referrer: document.referrer || '',
        utm_source: getCookie('utm_source'),
        utm_medium: getCookie('utm_medium'),
        utm_campaign: getCookie('utm_campaign'),
        utm_content: getCookie('utm_content'),
        utm_term: getCookie('utm_term')
      })
    }).catch(function() {});
  } catch(e) {}})();
</script>
